name: Luxicon
options:
  bundleIdPrefix: edu.davidson
  deploymentTarget:
    iOS: "18.0"
packages:
  Luxicon:
    path: ..
targets:
  Luxicon:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
      - Shared
      - Assets.xcassets
    dependencies:
      - package: Luxicon
        product: LuxiconKit
      - target: LuxiconWidgets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Luxicon
        # xcodegen defaults this to 1.0 and ignores MARKETING_VERSION unless
        # referenced explicitly; ASC's version train is 1.0 as a result.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: >-
          Luxicon records your 1-on-1 meetings so it can transcribe them.
          All processing happens on this device; audio never leaves your phone.
        UIBackgroundModes: [audio]
        # Continuous background tasks (iOS 26+) require a wildcard identifier:
        # bundle ID + semantic context + ".*"; each submission appends a
        # unique suffix (see ContinuedProcessing.swift).
        BGTaskSchedulerPermittedIdentifiers:
          - edu.davidson.luxicon.processing.*
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: edu.davidson.luxicon
            CFBundleURLSchemes: [luxicon]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.davidson.luxicon
        DEVELOPMENT_TEAM: 4Z539UE4TT
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 5
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Luxicon.entitlements
  LuxiconWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Widgets
      - Shared
    info:
      path: WidgetsInfo.plist
      properties:
        CFBundleDisplayName: Luxicon
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.davidson.luxicon.widgets
        DEVELOPMENT_TEAM: 4Z539UE4TT
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 5
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
