name: Luxicon
options:
  bundleIdPrefix: edu.davidson
  deploymentTarget:
    iOS: "18.0"
packages:
  Luxicon:
    path: ..
targets:
  Luxicon:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: Luxicon
        product: LuxiconKit
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Luxicon
        NSMicrophoneUsageDescription: >-
          Luxicon records your 1-on-1 meetings so it can transcribe them.
          All processing happens on this device; audio never leaves your phone.
        UIBackgroundModes: [audio]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.davidson.luxicon
        DEVELOPMENT_TEAM: 4Z539UE4TT
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Luxicon.entitlements
