name: Luxicon
options:
  bundleIdPrefix: edu.davidson
  deploymentTarget:
    iOS: "18.0"
packages:
  Luxicon:
    path: ..
settings:
  base:
    # One version train for the app and every extension: App Store validation
    # rejects uploads whose extension CFBundleVersion differs from the app's.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 12
targets:
  Luxicon:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
      - Shared
      - Assets.xcassets
      - Resources
    dependencies:
      - package: Luxicon
        product: LuxiconKit
      - target: LuxiconWidgets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Luxicon
        # xcodegen defaults this to 1.0 and ignores MARKETING_VERSION unless
        # referenced explicitly; ASC's version train is 1.0 as a result.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: >-
          Luxicon records your 1-on-1 meetings so it can transcribe them.
          All processing happens on this device; audio never leaves your phone.
        NSLocalNetworkUsageDescription: >-
          Luxicon uses the local network only if you set up Mac sync: to find
          your Mac and send it the transcripts you choose to sync. Without Mac
          sync, the local network is never used.
        NSBonjourServices:
          - _luxicon._tcp
        UIBackgroundModes: [audio]
        # Continuous background tasks (iOS 26+) require a wildcard identifier:
        # bundle ID + semantic context + ".*"; each submission appends a
        # unique suffix (see ContinuedProcessing.swift).
        BGTaskSchedulerPermittedIdentifiers:
          - edu.davidson.luxicon.processing.*
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: edu.davidson.luxicon
            CFBundleURLSchemes: [luxicon]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.davidson.luxicon
        DEVELOPMENT_TEAM: 4Z539UE4TT
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Luxicon.entitlements
  LuxiconWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Widgets
      - Shared
    info:
      path: WidgetsInfo.plist
      properties:
        CFBundleDisplayName: Luxicon
        # Match the parent app's versions; App Store validation rejects
        # extensions whose CFBundleVersion differs (xcodegen defaults to 1).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.davidson.luxicon.widgets
        DEVELOPMENT_TEAM: 4Z539UE4TT
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
